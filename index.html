        #app-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            gap: 40px;
        }

        /* 導覽與控制列 */
        .controls {
            background-color: #ffffff;
            padding: 15px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            display: flex;
            gap: 15px;
            align-items: center;
            position: sticky;
            top: 20px;
            z-index: 50;
        }

        select, button {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-family: inherit;
            font-size: 16px;
            cursor: pointer;
        }

        button {
            background-color: #4f46e5;
            color: white;
            border: none;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover { background-color: #4338ca; }

        /* 海報本體 (A4 比例) */
        .poster-page {
            width: 100%;
            max-width: 794px; /* A4 寬度參考 */
            aspect-ratio: 1 / 1.414;
            background-color: #ffffff;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            position: relative;
            overflow: hidden;
            border-radius: 0.75rem;
            display: flex;
            flex-direction: column;
        }

        .bg-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(currentColor 1px, transparent 1px);
            background-size: 20px 20px;
            opacity: 0.04;
            z-index: 0;
        }

        /* 列印模式設定 */
        @media print {
            body { background-color: #ffffff; padding: 0; }
            .controls { display: none !important; } /* 隱藏控制列 */
            #app-container { gap: 0; padding: 0; }
            .poster-page { 
                box-shadow: none; 
                border-radius: 0; 
                page-break-after: always; /* 強制每一張新頁面 */
                width: 100vw;
                height: 100vh;
                max-width: none;
                aspect-ratio: auto;
            }
        }

                voices: ["「好想去親近大自然喔！」", "「這隻小動物真的好可愛！」", "「我們應該好好保護地球。」"],
                strengths: ["像是一棵行光合作用的大樹，在自然環境中能迅速充飽電", "對動植物、生態與環境保護有著天生的熱忱與使命感", "喜歡在戶外走動、動手勞動，享受與大地連結的踏實感", "具備敏銳的觀察力，能察覺自然界微小的變化與規律"],
                blindSpots: ["在過度擁擠、吵雜或人造的環境中，容易感到窒息與焦慮。", "相對不擅長處理複雜的人際政治與心機算計。", "有時會為了堅持環保或生態理念，顯得較為固執不妥協。"],
                careers: ["獸醫/動物保育員", "農業/園藝/林業", "生態解說/國家公園巡山員", "戶外嚮導/探險家", "海洋/地質/環境研究員"]
            }
        ];

        //  Tailwind 顏色配置對應表 (為了讓CDN引擎識別，必須完整寫出 class 名稱)
        const themeMap = {
            blue: { bg: 'bg-blue-900', border: 'border-blue-500', textLight: 'text-blue-300', textDark: 'text-blue-800', bgLight: 'bg-blue-50', borderLight: 'border-blue-100', iconBg: 'bg-blue-700', iconBorder: 'border-blue-400', bullet: 'text-blue-500', textMain: 'text-blue-700', bgTag: 'bg-blue-100', textTag: 'text-blue-800' },

            slate: { bg: 'bg-slate-900', border: 'border-slate-500', textLight: 'text-slate-300', textDark: 'text-slate-800', bgLight: 'bg-slate-50', borderLight: 'border-slate-100', iconBg: 'bg-slate-700', iconBorder: 'border-slate-400', bullet: 'text-slate-500', textMain: 'text-slate-700', bgTag: 'bg-slate-100', textTag: 'text-slate-800' },

            indigo: { bg: 'bg-indigo-900', border: 'border-indigo-500', textLight: 'text-indigo-300', textDark: 'text-indigo-800', bgLight: 'bg-indigo-50', borderLight: 'border-indigo-100', iconBg: 'bg-indigo-700', iconBorder: 'border-indigo-400', bullet: 'text-indigo-500', textMain: 'text-indigo-700', bgTag: 'bg-indigo-100', textTag: 'text-indigo-800' },
            cyan: { bg: 'bg-cyan-900', border: 'border-cyan-500', textLight: 'text-cyan-300', textDark: 'text-cyan-800', bgLight: 'bg-cyan-50', borderLight: 'border-cyan-100', iconBg: 'bg-cyan-700', iconBorder: 'border-cyan-400', bullet: 'text-cyan-500', textMain: 'text-cyan-700', bgTag: 'bg-cyan-100', textTag: 'text-cyan-800' },
            lime: { bg: 'bg-lime-900', border: 'border-lime-500', textLight: 'text-lime-300', textDark: 'text-lime-800', bgLight: 'bg-lime-50', borderLight: 'border-lime-100', iconBg: 'bg-lime-700', iconBorder: 'border-lime-400', bullet: 'text-lime-500', textMain: 'text-lime-700', bgTag: 'bg-lime-100', textTag: 'text-lime-800' },
        };

        const renderPosterHTML = (item) => {
            const t = themeMap[item.color] || themeMap['slate'];
            
            // 語錄渲染
            const voicesHTML = item.voices.map(voice => 
                `<span class="bg-white px-4 py-2 rounded-full ${t.textMain} shadow-sm font-medium border border-gray-100">${voice}</span>`
            ).join('');

            // 優勢渲染
            const strengthsHTML = item.strengths.map(strength => 
                `<li class="flex items-start"><span class="${t.bullet} mr-2 mt-0.5">✦</span> <span>${strength}</span></li>`
            ).join('');

            // 盲點渲染
            const blindSpotsHTML = item.blindSpots.map(bs => 
                `<li class="flex items-start"><span class="text-orange-400 mr-2 mt-0.5">▸</span> <span>${bs}</span></li>`
            ).join('');

            // 職業渲染
            const careersHTML = item.careers.map(career => 
                `<span class="${t.bgTag} ${t.textTag} px-3 py-1.5 rounded-md font-semibold">${career}</span>`
            ).join('');

            return `
            <div class="poster-page text-${item.color}-900">
                <div class="bg-pattern text-${item.color}-500"></div>
                
                <!-- 標題區塊 -->

                    <div class="flex items-center justify-between">
                        <div>

                            <h1 class="text-5xl font-black mt-2 tracking-wide">${item.name} <span class="text-3xl font-medium ${t.textLight} ml-2 opacity-80">${item.english}</span></h1>
                            <p class="mt-4 text-white text-lg opacity-90">${item.quote}</p>
                        </div>
                        <div class="w-24 h-24 ${t.iconBg} rounded-full flex items-center justify-center border-4 ${t.iconBorder} shadow-lg flex-shrink-0">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                ${item.iconPath}
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- 主要內容區 -->
                <div class="flex-grow p-8 relative z-10 flex flex-col gap-6">

                    <div class="${t.bgLight} rounded-lg p-5 border ${t.borderLight}">
                        <h2 class="text-xl font-bold ${t.textDark} mb-3 flex items-center">
                            <span class="mr-2">💬</span> 你的內心常出現這些聲音嗎？
                        </h2>
                        <div class="flex flex-wrap gap-3">
                            ${voicesHTML}
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-6">
                        <!-- 核心特質 -->
                        <div class="bg-white border-2 border-gray-100 rounded-xl p-5 shadow-sm">
                            <h2 class="text-xl font-bold ${t.textDark} mb-3 border-b-2 ${t.borderLight} pb-2">✨ 你的超能力</h2>
                            <ul class="space-y-2 text-gray-700 font-medium">
                                ${strengthsHTML}
                            </ul>
                        </div>

                        <!-- 盲點防空洞 -->
                        <div class="bg-white border-2 border-orange-100 rounded-xl p-5 shadow-sm">
                            <h2 class="text-xl font-bold text-orange-600 mb-3 border-b-2 border-orange-100 pb-2">⚠️ 盲點防空洞</h2>
                            <p class="text-gray-700 font-medium mb-2 text-sm">當過度發揮時，你可能會：</p>
                            <ul class="space-y-2 text-gray-700">
                                ${blindSpotsHTML}
                            </ul>
                        </div>
                    </div>

                    <!-- 職業領域 -->
                    <div>
                        <h2 class="text-xl font-bold ${t.textDark} mb-3 flex items-center">
                            <span class="mr-2">🧭</span> 相關探索領域
                        </h2>
                        <div class="flex flex-wrap gap-2 text-sm">
                            ${careersHTML}
                        </div>
                    </div>
                </div>

                <!-- 互動任務區 -->
                <div class="bg-yellow-50 border-t-4 border-yellow-400 p-6 relative z-10 mt-auto">
                    <div class="flex items-start gap-4">
                        <div class="bg-yellow-400 text-yellow-900 rounded-full w-12 h-12 flex items-center justify-center font-black text-xl flex-shrink-0">
                            任務
                        </div>
                        <div>
                            <h3 class="font-bold text-yellow-800 text-lg mb-2">如果你在「${item.name}」得分最高，請在 A4 紙上寫下：</h3>
                            <ol class="list-decimal list-inside text-gray-800 space-y-2 font-medium">
                                <li>標題寫上大大的 <span class="${t.textMain} font-bold">「${item.id} ${item.name}」</span></li>
                                <li>從「你的超能力」中，抄寫一句你最喜歡的特質。</li>
                                <li>從「盲點防空洞」中，寫下一個你需要時常提醒自己的盲點。</li>
                                <li>從「相關探索領域」中，挑選 1~2 個你覺得最新奇或感興趣的職業。</li>
                                <li><strong>思考題：</strong>最近有哪件事讓你覺得「很有意義」？用一句話記錄下來。</li>
                            </ol>
                        </div>
                    </div>
                </div>
            </div>
            `;
        }

        const container = document.getElementById('app-container');

        // 渲染指定的類型，或全部渲染
        window.renderSpecific = (val) => {
            container.innerHTML = '';
            if (val === 'all') {
                data.forEach(item => {
                    container.innerHTML += renderPosterHTML(item);
                });
            } else {
                const target = data.find(item => item.id === val);
                if(target) {
                    container.innerHTML = renderPosterHTML(target);
                }
            }
        };

        // 初始載入 02 內省型 (預設選項)
        renderSpecific('02');

    </script>
